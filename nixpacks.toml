[phases.setup]
nixPkgs = ["go", "nodejs"]
aptPkgs = [
  "curl",
  "build-essential",
  "ca-certificates",
  "pkg-config",
  "libx11-dev",
  "libxrandr-dev",
  "libxtst-dev",
  "libgtk-3-dev",
  "libxcvt-dev",
  "libgstreamer1.0-dev",
  "libgstreamer-plugins-base1.0-dev"
]

[phases.install]
cmds = [
  "if [ ! -x /usr/local/go/bin/go ]; then curl -fsSL https://go.dev/dl/go1.25.1.linux-amd64.tar.gz | tar -C /usr/local -xz; fi",
  "cd server && /usr/local/go/bin/go mod download",
  "cd client && npm ci"
]

[phases.build]
cmds = [
  "cd server && PATH=/usr/local/go/bin:$PATH CGO_ENABLED=1 ./build core",
  "cd client && npm run build"
]

[start]
cmd = "cd server && NEKO_SERVER_BIND=0.0.0.0:8080 NEKO_SERVER_PROXY=true NEKO_SERVER_STATIC=../client/dist ./bin/neko serve -config=../config.yml"
