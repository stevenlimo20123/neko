[phases.setup]
nixPkgs = ["go"]
aptPkgs = [
  "curl",
  "build-essential",
  "ca-certificates",
  "pkg-config",
  "libx11-dev",
  "libxrandr-dev",
  "libxtst-dev",
  "libgtk-3-dev",
  "libxcvt-dev",
  "libgstreamer1.0-dev",
  "libgstreamer-plugins-base1.0-dev"
]

[phases.install]
cmds = [
  "if [ ! -x /usr/local/go/bin/go ]; then curl -fsSL https://go.dev/dl/go1.25.1.linux-amd64.tar.gz | tar -C /usr/local -xz; fi",
  "cd server && /usr/local/go/bin/go mod download"
]

[phases.build]
cmds = ["cd server && PATH=/usr/local/go/bin:$PATH CGO_ENABLED=1 ./build core"]

[start]
cmd = "cd server && ./bin/neko serve"
