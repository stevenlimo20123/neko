[phases.setup]
aptPkgs = [
  "ca-certificates",
  "pkg-config",
  "libx11-dev",
  "libxrandr-dev",
  "libxtst-dev",
  "libgtk-3-dev",
  "libxcvt-dev",
  "libgstreamer1.0-dev",
  "libgstreamer-plugins-base1.0-dev"
]

[phases.install]
cmds = ["cd server && go mod download"]

[phases.build]
cmds = ["cd server && ./build core"]

[start]
cmd = "cd server && ./bin/neko serve"
