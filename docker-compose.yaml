services:
  neko:
    image: "ghcr.io/m1k1o/neko/firefox:latest"
    restart: "unless-stopped"
    shm_size: "2gb"
    ports:
      - "8080:8080"
      - "52000-52100:52000-52100/udp"
    environment:
      NEKO_DESKTOP_SCREEN: 1920x1080@30
      NEKO_MEMBER_MULTIUSER_USER_PASSWORD: neko
      NEKO_MEMBER_MULTIUSER_ADMIN_PASSWORD: admin
      NEKO_WEBRTC_EPR: 52000-52100
      NEKO_WEBRTC_ICELITE: 1
      # See: https://neko.m1k1o.net/docs/v3/configuration/webrtc#ip
      # NEKO_NAT1TO1: <IP_ADDRESS>
      
      # IMPORTANT: set this to your server PUBLIC IP if auto-detect is wrong
      # (use your real value, no brackets)
      NEKO_WEBRTC_NAT1TO1: 84.46.255.28

      # Optional: if you prefer resolver instead of static NAT1TO1
      # NEKO_WEBRTC_IP_RETRIEVAL_URL: "https://ifconfig.co/ip"
